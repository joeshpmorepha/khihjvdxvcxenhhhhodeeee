<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html,body{
    margin:0;
    background:#000;
}

.wrapper{
    width:100%;
    max-width:900px;
    margin:20px auto;
    background:#fff;          /* White border */
    padding:3px;
    overflow:hidden;
}

.crop{
    overflow:hidden;
    height:320px;
    background:#000;
}

.crop iframe{
    width:100%;
    height:330px;
    border:0;
    display:block;
    margin-top:-3px;          /* Hides a few pixels at the top */
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="crop">
        <iframe src="https://player.twitch.tv/?channel=caedrel&enableExtensions=true&muted=false&parent=twitch.tv&player=popout&quality=chunked&volume=0.5" allowfullscreen></iframe>
    </div>
</div>

</body>
</html>
