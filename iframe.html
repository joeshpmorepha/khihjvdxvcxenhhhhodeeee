<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedded Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    height: 100%;
}

#player {
    width: 100%;
    height: 260px; /* Change as needed */
    border: none;
    display: block;
}
</style>
</head>

<body>

<iframe
    id="player"
    src="https://sportspass.site/soccer/fifa2026.html"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-fullscreen"
    allow="fullscreen; autoplay; encrypted-media"
    referrerpolicy="no-referrer">
</iframe>

</body>
</html>
