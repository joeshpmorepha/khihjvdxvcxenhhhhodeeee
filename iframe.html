<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}

.player{
    position:relative;
    width:100%;
    height:210px;
    overflow:hidden;
}

.player iframe{
    position:absolute;
    top:-40px;          /* Hide 40px from the top */
    left:0;
    width:100%;
    height:calc(250px + 40px);
    border:0;
    display:block;
}
</style>
</head>
<body>

<div class="player">
<iframe
    src="https://nickn9i0.q9xj5zaboutj0gkv6planned.cfd/football/fifa-world-cup-4374248/spain-vs-belgium.html?icg=SU4"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-fullscreen"
    allow="autoplay; fullscreen; encrypted-media"
    referrerpolicy="no-referrer"
    loading="eager">
</iframe>
</div>

</body>
</html>
