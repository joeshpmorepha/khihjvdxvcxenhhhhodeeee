<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Embedded iframe with back prevention</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #000;
}
iframe {
  width: 100vw;
  height: 260px; /* Adjust height as needed */
  border: 0;
  display: block;
  overflow: hidden;
}
</style>
</head>
<body>

<iframe id="myIframe" src="https://nickn9i0.q9xj5zaboutj0gkv6planned.cfd/football/fifa-world-cup-4374248/spain-vs-belgium.html?icg=SU4" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

<script>
// If the iframe is same-origin, prevent back navigation
const iframe = document.getElementById('myIframe');

iframe.onload = function() {
  try {
    // Access iframe's window object
    const iframeWindow = iframe.contentWindow;
    // Inject script to prevent back button (only works if same-origin)
    iframeWindow.history.pushState(null, null, iframeWindow.location.href);
    iframeWindow.onpopstate = function() {
      iframeWindow.history.go(1);
    };
  } catch (e) {
    // Cross-origin, cannot access iframe content
    console.warn('Cannot access iframe content due to cross-origin restrictions.');
  }
};
</script>

</body>
</html>
