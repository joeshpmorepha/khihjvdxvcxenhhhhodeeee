<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telegram-cricXfootball</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}
iframe{
    width:100vw;
    height:200px;
    border:0;
    display:block;
    overflow:hidden;
}
</style>
</head>
<body>

<iframe
    id="myIframe"
    src="https://nickn9i0.q9xj5zaboutj0gkv6planned.cfd/football/fifa-world-cup-4374248/spain-vs-belgium.html?icg=SU4"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-fullscreen"
    allow="autoplay; fullscreen; encrypted-media"
    referrerpolicy="no-referrer">
</iframe>

<script>
const iframe = document.getElementById('myIframe');

iframe.addEventListener('click', () => {
    try {
        // Access the iframe's current URL
        const iframeUrl = iframe.contentWindow.location.href;
        // Redirect the parent window to the iframe's URL
        window.location.href = iframeUrl;
    } catch (e) {
        // If cross-origin, we can't access iframe content
        // As an alternative, redirect to the iframe's src URL
        window.location.href = iframe.src;
    }
});
</script>

</body>
</html>
